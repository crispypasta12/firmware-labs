    <text x="150" y="468" font-family="IBM Plex Sans, Arial, sans-serif" font-size="48" font-weight="600">Practice the failure modes</text>
    <text x="150" y="516" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" fill="#5a6a7a">Interactive firmware simulators and drills</text>
  </g>
  <g font-family="IBM Plex Mono, Consolas, monospace" font-size="22" fill="#00d4aa">
    <text x="830" y="154">RTOS</text>
    <text x="908" y="154" fill="#ffb454">DMA</text>
    <text x="976" y="154" fill="#0099cc">BLE</text>
  </g>
</svg>
